# Docs for workflow syntax (including versioned actions examples):
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax [1](https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax)
#
# Docs for action metadata (runs.using node20 etc.) apply to action.yml for custom JS actions,
# not to workflow files like this one: https://docs.github.com/en/actions/reference/workflows-and-actions/metadata-syntax [2](https://docs.github.com/en/actions/reference/workflows-and-actions/metadata-syntax)

name: Build and deploy Python app to Azure Web App - appcmsweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for actions/checkout [1](https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax)

    steps:
      # Versioned actions: keep @v4/@v5 OR pin to a full commit SHA (recommended for hardening). [1](https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax)[3](https://spacelift.io/blog/github-actions-checkout)
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.14 is not generally available on GitHub runners today; use a released version like 3.12.
          python-version: "3.12"

      - name: Create venv and install dependencies (optional local build check)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: appcmsweb
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9842FA39520743F6896F7BF17D9D4E2F }}
